# Permanent regression harness for the alpha=2 corpus (ENV-06).
#
# Every push / PR re-runs the trust root over the STORED corpus: R1 corpus
# validity + R2 determinism panel + the fingerprint test, plus a `python -O`
# assert-stripping canary that proves the verifier is not a stripped-assert
# no-op. Linux x86_64 (ubuntu-latest) is the canonical reference platform; no
# macOS leg (Phase 3 is solver-free — macOS CI is out of scope per the
# reproduction-contract decision). All actions are pinned to 40-char commit
# SHAs (supply-chain hygiene, T-3-04); dependencies install via `uv sync
# --locked` and run via `uv run --frozen` so the committed lockfile is
# authoritative.
name: ci

on: [push, pull_request]

jobs:
  # Every-commit trust checks: R1 + R2 + fingerprint + the python -O canary.
  test:
    runs-on: ubuntu-latest # Linux x86_64 = canonical reference platform
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies (lockfile-authoritative)
        run: uv sync --locked --extra dev
      - name: R1 + R2 + fingerprint (verifier over stored corpus)
        run: uv run --frozen pytest tests/test_corpus_r1.py tests/test_corpus_r2.py tests/test_fingerprint.py -q
      - name: python -O assert-stripping canary
        # The trust root + corpus R1 must stay meaningful with asserts stripped
        # (Pitfall 6 / T-3-03): a rubber-stamp verifier would pass here otherwise.
        run: uv run --frozen python -O -m pytest tests/test_verifier_dash_O.py tests/test_corpus_r1.py -q
